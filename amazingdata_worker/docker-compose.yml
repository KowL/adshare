# AmazingData Worker — 独立数据拉取服务
#
# 职责:
#   - 连接 AmazingData SDK (必须 linux/amd64)
#   - 实时行情订阅 → 写入 Redis
#   - 定时同步 K线/代码表/日历 → 写入 L3 仓库 (./data/)
#
# 部署前准备:
#   1. 确保 .env 文件包含 AD_USERNAME, AD_PASSWORD, AD_HOST, AD_PORT
#   2. 确保 Redis 已部署并可访问 (修改 REDIS_HOST/REDIS_PORT)
#   3. 首次运行建议设置 SYNC_ON_START=true 拉取基础数据
#
# 构建命令（在项目根目录执行）:
#   docker-compose -f amazingdata_worker/docker-compose.yml build
# 启动命令（在项目根目录执行）:
#   docker-compose -f amazingdata_worker/docker-compose.yml up -d

version: "3.8"

services:
  amazingdata-worker:
    build:
      context: ..
      dockerfile: amazingdata_worker/Dockerfile
    platform: linux/amd64
    container_name: amazingdata-worker
    # SDK (InfoData/DownloadInfoData) hardcodes a Windows-style local path
    # "D://AmazingData_local_data" and creates it relative to the working
    # directory. Set working_dir to /app/data so the cache lands inside the
    # mounted host data directory (/Volumes/mm/project/adshare/data).
    working_dir: /app/data
    environment:
      - AD_USERNAME=${AD_USERNAME}
      - AD_PASSWORD=${AD_PASSWORD}
      - AD_HOST=${AD_HOST}
      - AD_PORT=${AD_PORT}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB:-0}
      - HISTORICAL_ENABLED=true
      - HISTORICAL_PATH=/app/data
      - DUCKDB_MODE=${DUCKDB_MODE:-memory}
      - SYNC_SCHEDULE_ENABLED=${SYNC_SCHEDULE_ENABLED:-true}
      - SYNC_ON_START=${SYNC_ON_START:-false}
      # IMPORTANT: For TGW accounts with a single concurrent connection,
      # historical sync and realtime subscription cannot run at the same time.
      # Keep false for after-hours sync; enable true only during market hours.
      - REALTIME_ENABLED=${REALTIME_ENABLED:-false}
      - ADSHARE_LOG_LEVEL=${ADSHARE_LOG_LEVEL:-INFO}
      - AMAZINGDATA_LOCAL_PATH=${AMAZINGDATA_LOCAL_PATH:-/app/data/amazingdata}
      - MAINTENANCE_SCHEDULE_ENABLED=${MAINTENANCE_SCHEDULE_ENABLED:-true}
      - MAINTENANCE_KLINE_DAY_OF_WEEK=${MAINTENANCE_KLINE_DAY_OF_WEEK:-sun}
      - MAINTENANCE_KLINE_HOUR=${MAINTENANCE_KLINE_HOUR:-3}
      - MAINTENANCE_KLINE_MINUTE=${MAINTENANCE_KLINE_MINUTE:-0}
      - MAINTENANCE_FINANCIAL_DAY_OF_WEEK=${MAINTENANCE_FINANCIAL_DAY_OF_WEEK:-sun}
      - MAINTENANCE_FINANCIAL_HOUR=${MAINTENANCE_FINANCIAL_HOUR:-4}
      - MAINTENANCE_FINANCIAL_MINUTE=${MAINTENANCE_FINANCIAL_MINUTE:-0}
      # Ensure local modules (amazingdata_worker) remain importable when
      # working_dir is changed to /app/data.
      - PYTHONPATH=/app
    volumes:
      - ../data:/app/data
      - ../cache:/app/cache
      - ../logs:/app/logs
    restart: unless-stopped
