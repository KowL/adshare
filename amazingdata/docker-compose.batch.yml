# amazingdata/docker-compose.batch.yml
# Batch sync service (盘后): APScheduler -> L3 warehouse.
#
# Config: amazingdata/batch.env (gitignored) — batch-dedicated TGW account
# + Redis credentials. realtime and batch use SEPARATE TGW accounts, so
# both services may run simultaneously. Never run two containers with the
# SAME account — TGW force-logouts the earlier session.
#
# Build:
#   docker compose -f amazingdata/docker-compose.batch.yml build
# Run:
#   docker compose -f amazingdata/docker-compose.batch.yml up -d

name: amazingdata-batch

services:
  amazingdata-batch:
    build:
      context: ..
      dockerfile: amazingdata/batch.Dockerfile
    platform: linux/amd64
    container_name: amazingdata-batch
    # SDK (InfoData) hardcodes "D://AmazingData_local_data" — set working_dir
    # to /app/data so the cache lands inside the mounted host data directory.
    working_dir: /app/data
    env_file:
      - batch.env
    environment:
      - HISTORICAL_ENABLED=true
      - HISTORICAL_PATH=/app/data
      - DUCKDB_MODE=${DUCKDB_MODE:-memory}
      - ADSHARE_LOG_LEVEL=${ADSHARE_LOG_LEVEL:-INFO}
      - ADSHARE_LOG_DIR=/app/logs
      # Ensure amazingdata package stays importable when working_dir is /app/data
      - PYTHONPATH=/app
    volumes:
      - ../data:/app/data
      - ../cache:/app/cache
      - ../logs:/app/logs
    restart: unless-stopped
