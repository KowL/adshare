# adshare 双服务架构
#
# adshare-api    : FastAPI HTTP API，读取 L3 仓库和 Redis
# amazingdata-worker : 连接 AmazingData SDK，拉取数据到 L3 仓库和 Redis
#
# 前提条件:
#   - Redis 已部署并可访问 (配置 REDIS_HOST/REDIS_PORT)
#   - Worker 必须在 linux/amd64 平台构建 (AmazingData SDK C 扩展限制)
#
# 启动命令:
#   docker compose up -d
#
# Worker 构建 (必须指定 linux/amd64 平台，AmazingData SDK C 扩展限制):
#   docker buildx build --platform linux/amd64 -t amazingdata-worker -f amazingdata_worker/Dockerfile .

version: "3.8"

services:
  adshare-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adshare-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB:-0}
      - ADSHARE_HOST=0.0.0.0
      - ADSHARE_PORT=8000
      - HISTORICAL_ENABLED=${HISTORICAL_ENABLED:-true}
      - HISTORICAL_PATH=${HISTORICAL_PATH:-/app/data}
      - DUCKDB_MODE=${DUCKDB_MODE:-memory}
      - ADSHARE_LOG_LEVEL=${ADSHARE_LOG_LEVEL:-INFO}
      - SYNC_SCHEDULE_ENABLED=false
      - REALTIME_ENABLED=false
    volumes:
      - ./data:/app/data
      - ./cache:/app/cache
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  amazingdata-worker:
    platform: linux/amd64
    build:
      context: .
      dockerfile: amazingdata_worker/Dockerfile
    container_name: amazingdata-worker
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB:-0}
      - HISTORICAL_ENABLED=${HISTORICAL_ENABLED:-true}
      - HISTORICAL_PATH=${HISTORICAL_PATH:-/app/data}
      - DUCKDB_MODE=${DUCKDB_MODE:-memory}
      - ADSHARE_LOG_LEVEL=${ADSHARE_LOG_LEVEL:-INFO}
      - SYNC_SCHEDULE_ENABLED=${SYNC_SCHEDULE_ENABLED:-true}
      - REALTIME_ENABLED=${REALTIME_ENABLED:-true}
      - SYNC_ON_START=${SYNC_ON_START:-true}
      - AD_USERNAME=${AD_USERNAME}
      - AD_PASSWORD=${AD_PASSWORD}
      - AD_HOST=${AD_HOST:-101.230.159.234}
      - AD_PORT=${AD_PORT:-8600}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ${HOME}/.ssh:/root/.ssh:ro
    restart: unless-stopped
    depends_on:
      - adshare-api
