# adshare API Service — 纯 API 服务，不连接 AmazingData SDK
#
# 职责:
#   - FastAPI HTTP/WebSocket API
#   - 读取 L3 历史仓库 (Parquet/DuckDB)
#   - 读取 Redis 实时缓存 (由 amazingdata-worker 写入)
#
# 前提条件:
#   - Redis 已部署并可访问 (配置 REDIS_HOST/REDIS_PORT)
#   - L3 仓库数据已存在 (由 amazingdata-worker 生成)
#
# 启动命令:
#   docker-compose up -d

version: "3.8"

services:
  adshare:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adshare
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB:-0}
      - ADSHARE_HOST=0.0.0.0
      - ADSHARE_PORT=8000
      - HISTORICAL_ENABLED=${HISTORICAL_ENABLED:-true}
      - HISTORICAL_PATH=${HISTORICAL_PATH:-/app/data}
      - DUCKDB_MODE=${DUCKDB_MODE:-memory}
      - ADSHARE_LOG_LEVEL=${ADSHARE_LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - ./cache:/app/cache
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
